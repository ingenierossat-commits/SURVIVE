  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --plum: #8b3a8b;
      --plum-light: #c060c0;
      --plum-dim: #4a1a4a;
      --plum-border: rgba(180,80,180,0.4);
      --olive: #6a9a3a;
      --olive-light: #90cc55;
      --olive-dim: rgba(106,154,58,0.2);
      --black: #080b06;
      --black-2: #101510;
      --black-3: #181e14;
      --black-4: #222a1c;
      --white: #eee8d8;
      --white-soft: #ddd8c8;
      --white-dim: #9a9080;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: #8b3a8b;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background: rgba(0,0,0,0.55);
      pointer-events: none;
    }

    /* ── HEADER ── */
    header {
      background: rgba(8,11,6,0.97);
      border-bottom: 2px solid var(--plum);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.7);
    }

    .logo {
      font-family: 'Exo 2', sans-serif; font-weight: 800;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo em { color: var(--plum-light); font-style: normal; }
    .logo-text {
      background: linear-gradient(90deg, #eee8d8 0%, #eee8d8 42%, #c060c0 42%, #c060c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
    }
    .logo-icon { color: var(--olive-light); font-size: 1rem; margin-right: 8px; }

    .breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; font-weight: 600; color: var(--white-dim); }
    .bc-item { cursor: pointer; transition: color 0.2s; letter-spacing: 0.08em; text-transform: uppercase; }
    .bc-item:hover, .bc-item.active { color: var(--plum-light); }
    .bc-sep { color: var(--black-4); }

    .header-right { display: flex; gap: 0.8rem; align-items: center; }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; position: relative; z-index: 10; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── HOME ── */
    .home-intro { text-align: center; padding: 1.5rem 0 2rem; }
    .home-intro h2 { font-size: 0.85rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--olive-light); margin-bottom: 0; font-weight: 600; }


    /* ── HOME GRID (temas) ── */
    .home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .cat-card {
      background: var(--black-2);
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 3px;
      padding: 3rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 130px;
    }
    .cat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 3px;
      background: var(--plum-light);
      transform: scaleX(0);
      transition: transform 0.3s;
    }
    .cat-card:hover { border-color: var(--plum-light); background: var(--black-3); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .cat-card:hover::after { transform: scaleX(1); }

    .cat-card-inner { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .cat-name {
      font-family: 'Syncopate', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    .cat-meta { font-size: 0.68rem; color: var(--white-dim); font-weight: 500; letter-spacing: 0.05em; }

    .cat-actions {
      position: absolute;
      top: 0.5rem; right: 0.5rem;
      display: flex; gap: 0.3rem;
      opacity: 1;
    }

    /* ADD CARD */
    .add-cat-card {
      background: transparent;
      border: 2px dashed rgba(123,63,123,0.3);
      border-radius: 3px;
      padding: 3rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; min-height: 130px;
      color: var(--white-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .add-cat-card:hover { border-color: var(--plum-light); color: var(--plum-light); background: rgba(123,63,123,0.05); }
    .add-cat-card span { font-size: 1.8rem; line-height: 1; }

    /* ── PAGE STRUCTURE ── */
    .page-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--plum-border); flex-wrap: wrap; gap: 1rem; }
    .page-hdr h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .page-hdr h1 em { color: var(--plum-light); font-style: normal; }
    .page-sub { font-size: 0.75rem; color: var(--white-dim); margin-top: 0.3rem; font-weight: 500; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--white-dim); cursor: pointer;
      transition: color 0.2s; background: none; border: none;
      margin-bottom: 1.5rem; padding: 0; font-family: 'Rajdhani', sans-serif;
    }
    .back-btn:hover { color: var(--plum-light); }

    /* ── SUBTEMAS GRID ── */
    .brands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }

    .brand-card {
      background: var(--black-2);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 3px;
      padding: 2.5rem 1.5rem;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      text-align: center; position: relative; min-height: 100px;
    }
    .brand-card:hover { border-color: var(--plum-light); background: var(--black-3); transform: translateY(-2px); }
    .brand-name {
      font-family: 'Syncopate', sans-serif;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--white); line-height: 1.7;
    }
    .brand-actions { position: absolute; top: 0.5rem; right: 0.5rem; display: flex; gap: 0.3rem; opacity: 1; }
    .brand-meta { font-size: 0.62rem; color: var(--white-dim); margin-top: 6px; }

    /* ── VIDEO LIST (modelos → videos) ── */
    .models-list { display: flex; flex-direction: column; gap: 0.8rem; }

    .model-row {
      background: var(--black-2);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 3px;
      overflow: hidden;
    }
    .model-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.2rem; cursor: pointer;
      transition: background 0.2s; user-select: none;
    }
    .model-hdr:hover { background: var(--black-3); }
    .model-hdr-left { display: flex; align-items: center; gap: 0.8rem; }
    .model-chevron { font-size: 0.65rem; color: var(--plum-light); transition: transform 0.2s; }
    .model-row.open .model-chevron { transform: rotate(90deg); }
    .model-name { font-size: 1rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .vid-badge { font-size: 0.68rem; color: var(--olive-light); font-weight: 600; background: rgba(90,122,58,0.15); padding: 0.2rem 0.6rem; border-radius: 2px; }
    .model-acts { display: flex; gap: 0.4rem; align-items: center; }
    .model-body { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--plum-border); }
    .model-row.open .model-body { display: block; }

    /* ── VIDEO ITEMS ── */
    .vid-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.8rem; }

    .vid-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0; background: var(--black-3);
      border: 1px solid rgba(123,63,123,0.2);
      border-radius: 3px; transition: all 0.2s;
      overflow: hidden;
    }
    .vid-item:hover { border-color: var(--plum); }

    .vid-thumb {
      width: 100px; height: 56px;
      flex-shrink: 0;
      background: var(--plum-dim);
      position: relative; overflow: hidden;
    }
    .vid-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .vid-thumb-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: var(--plum-light);
      background: linear-gradient(135deg, #1a0d1a, #100810);
    }

    .vid-info { flex: 1; min-width: 0; padding: 0.5rem 0; }
    .vid-name {
      font-size: 0.88rem; font-weight: 600;
      color: var(--white-soft); cursor: pointer;
      transition: color 0.2s; text-transform: uppercase;
      letter-spacing: 0.04em; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .vid-name:hover { color: var(--plum-light); }
    .vid-url-text { font-size: 0.62rem; color: var(--white-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }

    .vid-acts { display: flex; gap: 0.4rem; flex-shrink: 0; padding-right: 0.8rem; }

    .add-vid-btn {
      margin-top: 1rem; width: 100%; padding: 0.9rem;
      background: transparent;
      border: 2px dashed rgba(123,63,123,0.3);
      border-radius: 3px;
      color: var(--plum-light);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .add-vid-btn:hover { border-color: var(--plum-light); background: rgba(123,63,123,0.06); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.2rem; border-radius: 3px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--plum); color: #fff; }
    .btn-primary:hover { background: var(--plum-light); }
    .btn-ghost { background: transparent; color: var(--white-dim); border: 1px solid var(--plum-border); padding: 0.4rem 0.7rem; font-size: 0.72rem; }
    .btn-ghost:hover { color: var(--white); border-color: var(--plum-light); }
    .btn-danger { background: transparent; color: #e05050; border: 1px solid rgba(224,80,80,0.3); padding: 0.4rem 0.7rem; font-size: 0.72rem; }
    .btn-danger:hover { background: rgba(224,80,80,0.1); border-color: #e05050; }
    .btn-row { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; margin-top: 1.2rem; }

    /* ── SEARCH ── */
    .search-wrap { margin-bottom: 2rem; }
    .search-input {
      width: 100%; padding: 0.7rem 1rem;
      background: var(--black-2);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 3px;
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 500; outline: none;
    }
    .search-input::placeholder { color: var(--white-dim); }
    .search-input:focus { border-color: var(--plum-light); }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 4rem 2rem; color: var(--black-4); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .empty h3 { font-size: 1rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--white-dim); }

    /* ── MODAL ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--black-2); border: 1.5px solid var(--plum); border-radius: 4px; padding: 2rem; width: 100%; max-width: 480px; box-shadow: 0 0 40px rgba(123,63,123,0.25); position: relative; z-index: 10; }
    .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--plum-border); }
    .modal-hdr h3 { font-size: 1rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--plum-light); }
    .btn-close { background: none; border: none; color: var(--white-dim); font-size: 1.2rem; cursor: pointer; }
    .btn-close:hover { color: var(--white); }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
    label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--white-dim); }
    input[type="text"] { padding: 0.7rem 1rem; background: var(--black-3); border: 1.5px solid var(--plum-border); border-radius: 3px; color: var(--white); font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 600; outline: none; width: 100%; }
    input[type="text"]:focus { border-color: var(--plum-light); }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 0.8rem 1.5rem; border-radius: 3px; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.ok  { background: var(--plum); color: #fff; }
    .toast.err { background: #e05050; color: #fff; }

    /* ── VIDEO FULLSCREEN MODAL ── */
    .vid-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 600;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .vid-modal-backdrop.open { display: flex; }
    .vid-modal-header {
      width: 100%; max-width: 1000px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 1rem;
      gap: 1rem;
    }
    .vid-modal-title {
      font-family: 'Syncopate', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--white); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .vid-modal-close {
      background: var(--plum-dim); border: 1px solid var(--plum);
      color: var(--white); font-size: 1rem;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background 0.2s;
      border-radius: 2px;
    }
    .vid-modal-close:hover { background: var(--plum); }
    .vid-modal-open-yt {
      background: transparent; border: 1px solid var(--plum-border);
      color: var(--white-dim); font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0 12px; height: 36px;
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; transition: all 0.2s; border-radius: 2px;
      text-decoration: none; flex-shrink: 0;
    }
    .vid-modal-open-yt:hover { border-color: var(--plum-light); color: var(--white); }
    .vid-iframe-wrap {
      width: 100%; max-width: 1000px;
      aspect-ratio: 16/9;
      background: #000;
      border: 1px solid var(--plum-dim);
    }
    .vid-iframe-wrap iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    @media (max-width: 600px) {
      header { padding: 0 1rem; height: 60px; }
      .logo  { font-size: 1rem; }
      .breadcrumb { display: none; }
      main { padding: 1rem 0.8rem; }
      .home-grid { grid-template-columns: 1fr 1fr; }
      .brands-grid { grid-template-columns: 1fr 1fr; }

      /* Video cards en móvil: sin miniatura, solo título + botón */
      .vid-thumb { display: none; }
      .vid-item {
        flex-direction: column;
        align-items: stretch;
        border-left-width: 3px;
      }
      .vid-info {
        padding: 0.8rem 1rem 0.3rem;
      }
      .vid-name {
        font-size: 1rem;
        white-space: normal;
        line-height: 1.4;
        margin-bottom: 0;
      }
      .vid-url-text { display: none; }
      .vid-acts {
        padding: 0.5rem 1rem 0.8rem;
        gap: 0.5rem;
      }
      .vid-acts .btn-primary { font-size: 0.8rem; padding: 0.5rem 1rem; }
      .vid-acts .btn-ghost   { font-size: 0.75rem; }
      .vid-acts .btn-danger  { font-size: 0.75rem; }

      /* Model row en móvil */
      .model-hdr { padding: 0.9rem 1rem; }
      .model-body { padding: 0 0.8rem 0.8rem; }
      .add-vid-btn { padding: 0.8rem; }

      /* Page header en móvil */
      .page-hdr { flex-direction: column; align-items: flex-start; gap: 0.6rem; }
      .page-hdr h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">
    <span class="logo-icon">◈</span><span class="logo-text">SURVIVE</span>
  </div>
  <div class="breadcrumb" id="bc"></div>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="goHome()">◈ Inicio</button>
  </div>
</header>

<main>
  <!-- PANTALLA: INICIO (TEMAS) -->
  <div class="screen active" id="s-home">
    <div class="home-intro">
      <h2>Videoteca de supervivencia</h2>
    </div>
    <div class="home-grid" id="homeGrid"></div>
  </div>

  <!-- PANTALLA: SUBTEMAS -->
  <div class="screen" id="s-subtemas">
    <button class="back-btn" onclick="goHome()">← Volver al inicio</button>
    <div class="page-hdr">
      <div>
        <h1><em id="tema-title"></em></h1>
        <div class="page-sub" id="tema-sub"></div>
      </div>
      <button class="btn btn-primary" onclick="openModalSub()">+ Añadir subtema</button>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchSub" placeholder="Buscar subtema..." oninput="renderSubtemas()">
    </div>
    <div class="brands-grid" id="subGrid"></div>
  </div>

  <!-- PANTALLA: VÍDEOS -->
  <div class="screen" id="s-videos">
    <button class="back-btn" id="backToSubs" onclick="">← Volver a subtemas</button>
    <div class="page-hdr">
      <div>
        <h1><em id="sub-title"></em></h1>
        <div class="page-sub" id="sub-sub"></div>
      </div>
      <button class="btn btn-primary" onclick="openModalVid()">+ Añadir vídeo</button>
    </div>
    <div class="models-list" id="vidList"></div>
  </div>
</main>

<!-- MODAL: NUEVO TEMA -->
<div class="modal-backdrop" id="m-tema">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="m-tema-titulo">Nuevo tema</h3>
      <button class="btn-close" onclick="closeModal('m-tema')">✕</button>
    </div>
    <div class="form-group">
      <label>Nombre del tema</label>
      <input type="text" id="inp-tema" placeholder="Ej: TRAMPAS, ARMAS, REFUGIOS...">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveTema()">Guardar tema</button>
      <button class="btn btn-ghost" onclick="closeModal('m-tema')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL: NUEVO SUBTEMA -->
<div class="modal-backdrop" id="m-sub">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="m-sub-titulo">Nuevo subtema</h3>
      <button class="btn-close" onclick="closeModal('m-sub')">✕</button>
    </div>
    <div class="form-group">
      <label>Nombre del subtema</label>
      <input type="text" id="inp-sub" placeholder="Ej: LAZOS, FOSOS, CEBOS...">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveSub()">Guardar subtema</button>
      <button class="btn btn-ghost" onclick="closeModal('m-sub')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL: AÑADIR VÍDEO -->
<div class="modal-backdrop" id="m-vid">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="m-vid-titulo">Añadir vídeo</h3>
      <button class="btn-close" onclick="closeModal('m-vid')">✕</button>
    </div>
    <div class="form-group">
      <label>Nombre del vídeo</label>
      <input type="text" id="inp-vid-nombre" placeholder="Ej: Cómo hacer una trampa de caída">
    </div>
    <div class="form-group">
      <label>URL de YouTube</label>
      <input type="text" id="inp-vid-url" placeholder="https://youtube.com/watch?v=...">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveVid()">Guardar vídeo</button>
      <button class="btn btn-ghost" onclick="closeModal('m-vid')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL: EDITAR NOMBRE -->
<div class="modal-backdrop" id="m-edit">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="m-edit-titulo">Editar nombre</h3>
      <button class="btn-close" onclick="closeModal('m-edit')">✕</button>
    </div>
    <div class="form-group">
      <label>Nuevo nombre</label>
      <input type="text" id="inp-edit">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveEdit()">Guardar</button>
      <button class="btn btn-ghost" onclick="closeModal('m-edit')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL: VER VÍDEO PANTALLA COMPLETA -->
<div class="vid-modal-backdrop" id="m-player">
  <div class="vid-modal-header">
    <div class="vid-modal-title" id="player-title"></div>
    <a id="player-yt-link" href="#" target="_blank" class="vid-modal-open-yt">↗ Abrir en YouTube</a>
    <div class="vid-modal-close" onclick="closePlayer()">✕</div>
  </div>
  <div class="vid-iframe-wrap">
    <iframe id="player-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
</div>

<!-- MODAL: CONFIRMAR BORRADO -->
<div class="modal-backdrop" id="m-confirm">
  <div class="modal" style="max-width:360px; text-align:center;">
    <div class="modal-hdr" style="justify-content:center; border:none; margin-bottom:0.8rem; padding-bottom:0;">
      <h3 style="color:#e05050;">⚠ Eliminar vídeo</h3>
    </div>
    <p id="confirm-msg" style="font-size:0.95rem; color:var(--white-dim); margin-bottom:1.5rem; font-weight:500;"></p>
    <div class="btn-row" style="justify-content:center;">
      <button class="btn btn-danger" style="padding:0.6rem 1.5rem;" onclick="confirmDelete()">Eliminar</button>
      <button class="btn btn-ghost" onclick="document.getElementById('m-confirm').classList.remove('open'); pendingDelete=null;">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── DB ──
  var db = JSON.parse(localStorage.getItem('survive_db') || '{"temas":[]}');
  var curTema = null, curSub = null;
  var editCtx = null; // {type, temaIdx, subIdx, vidIdx}
  var pendingDelete = null;
  var addVidToSub = null;

  function dbSave() { localStorage.setItem('survive_db', JSON.stringify(db)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function ytId(url) { var m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }

  // ── SCREENS ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  // ── BREADCRUMB ──
  function renderBC() {
    var el = document.getElementById('bc');
    var s = document.querySelector('.screen.active').id;
    var html = '<span class="bc-item ' + (s==='s-home'?'active':'') + '" onclick="goHome()">Inicio</span>';
    if (s !== 's-home') {
      var t = db.temas.find(function(t){ return t.id === curTema; });
      html += '<span class="bc-sep">›</span><span class="bc-item ' + (s==='s-subtemas'?'active':'') + '" onclick="goTema(\'' + curTema + '\')">' + (t?t.nombre:'') + '</span>';
    }
    if (s === 's-videos') {
      var tema = db.temas.find(function(t){ return t.id === curTema; });
      var sub = tema ? tema.subtemas.find(function(s){ return s.id === curSub; }) : null;
      html += '<span class="bc-sep">›</span><span class="bc-item active">' + (sub?sub.nombre:'') + '</span>';
    }
    el.innerHTML = html;
  }

  // ── HOME ──
  function goHome() { showScreen('s-home'); renderHome(); renderBC(); }

  function renderHome() {
    var grid = document.getElementById('homeGrid');
    var sorted = db.temas.slice().sort(function(a,b){ return a.nombre.localeCompare(b.nombre); });
    var html = '';
    sorted.forEach(function(t) {
      var totalV = t.subtemas.reduce(function(a,s){ return a + s.videos.length; }, 0);
      html += '<div class="cat-card" onclick="goTema(\'' + t.id + '\')">' +
        '<div class="cat-actions">' +
          '<button class="btn btn-ghost" onclick="event.stopPropagation();openEditTema(\'' + t.id + '\')">✎</button>' +
          '<button class="btn btn-danger" onclick="event.stopPropagation();deleteTema(\'' + t.id + '\')">🗑</button>' +
        '</div>' +
        '<div class="cat-card-inner">' +
          '<div class="cat-name">' + t.nombre + '</div>' +
          '<div class="cat-meta">' + t.subtemas.length + ' subtemas · ' + totalV + ' vídeos</div>' +
        '</div>' +
      '</div>';
    });
    html += '<div class="add-cat-card" onclick="openModalTema()"><span>+</span>Nuevo tema</div>';
    grid.innerHTML = html;
  }

  // ── TEMAS ──
  function openModalTema() { editCtx=null; document.getElementById('m-tema-titulo').textContent='Nuevo tema'; document.getElementById('inp-tema').value=''; openModal('m-tema'); setTimeout(function(){ document.getElementById('inp-tema').focus(); }, 150); }

  function openEditTema(id) {
    var t = db.temas.find(function(t){ return t.id===id; });
    if (!t) return;
    editCtx = { type:'tema', id:id };
    document.getElementById('m-edit-titulo').textContent = 'Editar tema';
    document.getElementById('inp-edit').value = t.nombre;
    openModal('m-edit');
    setTimeout(function(){ document.getElementById('inp-edit').focus(); }, 150);
  }

  function saveTema() {
    var nombre = document.getElementById('inp-tema').value.trim().toUpperCase();
    if (!nombre) { showToast('⚠ Escribe un nombre', 'err'); return; }
    db.temas.push({ id: uid(), nombre: nombre, subtemas: [] });
    dbSave(); closeModal('m-tema'); renderHome();
    showToast('✓ Tema creado', 'ok');
  }

  function deleteTema(id) {
    var t = db.temas.find(function(t){ return t.id===id; });
    if (!t) return;
    pendingDelete = { type: 'tema', id: id };
    document.getElementById('confirm-msg').textContent = '¿Eliminar "' + t.nombre + '" y todo su contenido?';
    document.getElementById('m-confirm').classList.add('open');
  }

  // ── SUBTEMAS ──
  function goTema(id) {
    curTema = id;
    var t = db.temas.find(function(t){ return t.id===id; });
    if (!t) return;
    document.getElementById('tema-title').textContent = t.nombre;
    document.getElementById('tema-sub').textContent = t.subtemas.length + ' subtema(s) registrado(s)';
    document.getElementById('searchSub').value = '';
    showScreen('s-subtemas'); renderSubtemas(); renderBC();
  }

  function renderSubtemas() {
    var t = db.temas.find(function(t){ return t.id===curTema; });
    if (!t) return;
    var q = document.getElementById('searchSub').value.trim().toLowerCase();
    var grid = document.getElementById('subGrid');
    var list = t.subtemas.slice().sort(function(a,b){ return a.nombre.localeCompare(b.nombre); });
    if (q) list = list.filter(function(s){ return s.nombre.toLowerCase().includes(q); });
    var html = '';
    list.forEach(function(s) {
      html += '<div class="brand-card" onclick="goSub(\'' + s.id + '\')">' +
        '<div class="brand-actions">' +
          '<button class="btn btn-ghost" onclick="event.stopPropagation();openEditSub(\'' + s.id + '\')">✎</button>' +
          '<button class="btn btn-danger" onclick="event.stopPropagation();deleteSub(\'' + s.id + '\')">🗑</button>' +
        '</div>' +
        '<div>' +
          '<div class="brand-name">' + s.nombre + '</div>' +
          '<div class="brand-meta">' + s.videos.length + ' vídeo(s)</div>' +
        '</div>' +
      '</div>';
    });
    if (list.length === 0 && !q) {
      html = '<div class="empty" style="grid-column:1/-1"><span class="empty-icon">📂</span><h3>Sin subtemas aún</h3></div>';
    }
    grid.innerHTML = html;
    document.getElementById('tema-sub').textContent = t.subtemas.length + ' subtema(s) registrado(s)';
  }

  function openModalSub() { editCtx=null; document.getElementById('m-sub-titulo').textContent='Nuevo subtema'; document.getElementById('inp-sub').value=''; openModal('m-sub'); setTimeout(function(){ document.getElementById('inp-sub').focus(); }, 150); }

  function openEditSub(id) {
    var t = db.temas.find(function(t){ return t.id===curTema; });
    var s = t ? t.subtemas.find(function(s){ return s.id===id; }) : null;
    if (!s) return;
    editCtx = { type:'sub', id:id };
    document.getElementById('m-edit-titulo').textContent = 'Editar subtema';
    document.getElementById('inp-edit').value = s.nombre;
    openModal('m-edit');
    setTimeout(function(){ document.getElementById('inp-edit').focus(); }, 150);
  }

  function saveSub() {
    var nombre = document.getElementById('inp-sub').value.trim().toUpperCase();
    if (!nombre) { showToast('⚠ Escribe un nombre', 'err'); return; }
    var t = db.temas.find(function(t){ return t.id===curTema; });
    if (!t) return;
    t.subtemas.push({ id: uid(), nombre: nombre, videos: [] });
    dbSave(); closeModal('m-sub'); renderSubtemas();
    showToast('✓ Subtema creado', 'ok');
  }

  function deleteSub(id) {
    var t = db.temas.find(function(t){ return t.id===curTema; });
    if (!t) return;
    var s = t.subtemas.find(function(s){ return s.id===id; });
    if (!s) return;
    pendingDelete = { type: 'sub', id: id };
    document.getElementById('confirm-msg').textContent = '¿Eliminar "' + s.nombre + '" y sus vídeos?';
    document.getElementById('m-confirm').classList.add('open');
  }

  // ── VÍDEOS ──
  function goSub(id) {
    curSub = id;
    var t = db.temas.find(function(t){ return t.id===curTema; });
    var s = t ? t.subtemas.find(function(s){ return s.id===id; }) : null;
    if (!s) return;
    document.getElementById('sub-title').textContent = s.nombre;
    document.getElementById('sub-sub').textContent = s.videos.length + ' vídeo(s)';
    document.getElementById('backToSubs').onclick = function() { goTema(curTema); };
    showScreen('s-videos'); renderVidList(); renderBC();
  }

  function renderVidList() {
    var t = db.temas.find(function(t){ return t.id===curTema; });
    var s = t ? t.subtemas.find(function(s){ return s.id===curSub; }) : null;
    if (!s) return;
    var list = document.getElementById('vidList');
    document.getElementById('sub-sub').textContent = s.videos.length + ' vídeo(s)';

    if (s.videos.length === 0) {
      list.innerHTML = '<div class="empty"><span class="empty-icon">🎬</span><h3>Sin vídeos aún</h3></div>';
      return;
    }

    // Agrupar en una sola fila expandible (tipo model-row)
    var html = '<div class="model-row open" id="vid-group">' +
      '<div class="model-hdr" onclick="toggleVidGroup()">' +
        '<div class="model-hdr-left">' +
          '<span class="model-chevron">▶</span>' +
          '<span class="model-name">Vídeos</span>' +
          '<span class="vid-badge">' + s.videos.length + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="model-body">' +
        '<div class="vid-list">';

    s.videos.forEach(function(v, vi) {
      var id = ytId(v.url);
      var thumb = id ? 'https://img.youtube.com/vi/' + id + '/mqdefault.jpg' : null;
      var safeName = v.nombre.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html += '<div class="vid-item">' +
        '<div class="vid-thumb">' +
          (thumb
            ? '<img src="' + thumb + '" onerror="this.parentNode.innerHTML=\'<div class=vid-thumb-placeholder>▶</div>\'">'
            : '<div class="vid-thumb-placeholder">▶</div>'
          ) +
        '</div>' +
        '<div class="vid-info">' +
          '<div class="vid-name" onclick="playVid(\'' + v.url + '\',\'' + safeName + '\')">' + v.nombre + '</div>' +
          '<div class="vid-url-text">' + v.url + '</div>' +
        '</div>' +
        '<div class="vid-acts">' +
          '<button class="btn btn-primary" onclick="playVid(\'' + v.url + '\',\'' + safeName + '\')">▶ Ver</button>' +
          '<button class="btn btn-ghost" onclick="openEditVidById(\'' + v.id + '\')">✎ Renombrar</button>' +
          '<button class="btn btn-danger" onclick="deleteVidById(\'' + v.id + '\')">🗑</button>' +
        '</div>' +
      '</div>';
    });

    html += '</div>' +
      '<button class="add-vid-btn" onclick="openModalVid()">+ Añadir vídeo</button>' +
      '</div></div>';

    list.innerHTML = html;
  }

  function toggleVidGroup() {
    var row = document.getElementById('vid-group');
    if (row) row.classList.toggle('open');
  }

  function openModalVid() {
    editCtx = null;
    document.getElementById('m-vid-titulo').textContent = 'Añadir vídeo';
    document.getElementById('inp-vid-nombre').value = '';
    document.getElementById('inp-vid-url').value = '';
    openModal('m-vid');
    setTimeout(function(){ document.getElementById('inp-vid-nombre').focus(); }, 150);
  }

  function openEditVidById(vid) {
    var t = db.temas.find(function(t){ return t.id===curTema; });
    var s = t ? t.subtemas.find(function(s){ return s.id===curSub; }) : null;
    if (!s) return;
    var v = s.videos.find(function(v){ return v.id===vid; });
    if (!v) return;
    editCtx = { type:'vid', vid: vid };
    document.getElementById('m-edit-titulo').textContent = 'Renombrar vídeo';
    document.getElementById('inp-edit').value = v.nombre;
    openModal('m-edit');
    setTimeout(function(){ document.getElementById('inp-edit').focus(); }, 150);
  }

  function saveVid() {
    var nombre = document.getElementById('inp-vid-nombre').value.trim();
    var url    = document.getElementById('inp-vid-url').value.trim();
    if (!nombre) { showToast('⚠ Escribe un nombre', 'err'); return; }
    if (!url)    { showToast('⚠ Pega la URL de YouTube', 'err'); return; }
    var t = db.temas.find(function(t){ return t.id===curTema; });
    var s = t ? t.subtemas.find(function(s){ return s.id===curSub; }) : null;
    if (!s) return;
    s.videos.push({ id: uid(), nombre: nombre, url: url });
    dbSave(); closeModal('m-vid'); renderVidList();
    showToast('✓ Vídeo añadido', 'ok');
  }

  function deleteVidById(vid) {
    var t = db.temas.find(function(t){ return t.id===curTema; });
    var s = t ? t.subtemas.find(function(s){ return s.id===curSub; }) : null;
    if (!s) return;
    var v = s.videos.find(function(v){ return v.id===vid; });
    if (!v) return;
    pendingDeleteVid = vid;
    document.getElementById('confirm-msg').textContent = '\u00bfEliminar "' + v.nombre + '"?';
    document.getElementById('m-confirm').classList.add('open');
  }

  function confirmDelete() {
    if (!pendingDelete) return;
    if (pendingDelete.type === 'tema') {
      db.temas = db.temas.filter(function(t){ return t.id!==pendingDelete.id; });
      dbSave(); renderHome();
      showToast('Tema eliminado', 'ok');
    } else if (pendingDelete.type === 'sub') {
      var t = db.temas.find(function(t){ return t.id===curTema; });
      if (t) { t.subtemas = t.subtemas.filter(function(s){ return s.id!==pendingDelete.id; }); }
      dbSave(); renderSubtemas();
      showToast('Subtema eliminado', 'ok');
    } else if (pendingDelete.type === 'vid') {
      var t2 = db.temas.find(function(t){ return t.id===curTema; });
      var s2 = t2 ? t2.subtemas.find(function(s){ return s.id===curSub; }) : null;
      if (s2) { s2.videos = s2.videos.filter(function(v){ return v.id!==pendingDelete.id; }); }
      dbSave(); renderVidList();
      showToast('Vídeo eliminado', 'ok');
    }
    pendingDelete = null;
    document.getElementById('m-confirm').classList.remove('open');
  }

  // ── EDIT GENÉRICO ──
  function saveEdit() {
    var val = document.getElementById('inp-edit').value.trim().toUpperCase();
    if (!val) return;
    if (editCtx.type === 'tema') {
      var t = db.temas.find(function(t){ return t.id===editCtx.id; });
      if (t) { t.nombre = val; dbSave(); closeModal('m-edit'); renderHome(); showToast('✓ Tema actualizado', 'ok'); }
    } else if (editCtx.type === 'sub') {
      var tema = db.temas.find(function(t){ return t.id===curTema; });
      var s = tema ? tema.subtemas.find(function(s){ return s.id===editCtx.id; }) : null;
      if (s) { s.nombre = val; dbSave(); closeModal('m-edit'); renderSubtemas(); showToast('✓ Subtema actualizado', 'ok'); }
    } else if (editCtx.type === 'vid') {
      var tema2 = db.temas.find(function(t){ return t.id===curTema; });
      var sub2  = tema2 ? tema2.subtemas.find(function(s){ return s.id===curSub; }) : null;
      var vid2  = sub2 ? sub2.videos.find(function(v){ return v.id===editCtx.vid; }) : null;
      if (vid2) {
        vid2.nombre = val;
        dbSave(); closeModal('m-edit'); renderVidList(); showToast('\u2713 V\u00eddeo actualizado', 'ok');
      }
    }
  }

  // ── MODAL UTILS ──
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // Close on backdrop click
  document.querySelectorAll('.modal-backdrop').forEach(function(el) {
    el.addEventListener('click', function(e) { if (e.target === el) el.classList.remove('open'); });
  });

  // Enter key
  document.getElementById('inp-tema').addEventListener('keydown', function(e){ if(e.key==='Enter') saveTema(); });
  document.getElementById('inp-sub').addEventListener('keydown',  function(e){ if(e.key==='Enter') saveSub(); });
  document.getElementById('inp-vid-url').addEventListener('keydown', function(e){ if(e.key==='Enter') saveVid(); });
  document.getElementById('inp-edit').addEventListener('keydown', function(e){ if(e.key==='Enter') saveEdit(); });

  // ── TOAST ──
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + (type||'ok');
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2800);
  }

  // ── PLAYER ──
  function playVid(url, nombre) {
    window.open(url, '_blank');
  }

  // ── INIT ──
  renderHome();
</script>

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
